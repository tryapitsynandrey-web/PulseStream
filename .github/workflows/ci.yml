name: PulseStream CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compile Application
      run: mvn clean compile -B

    - name: Run Unit Tests
      run: mvn test -B

    - name: Run Integration Verification
      run: mvn failsafe:integration-test failsafe:verify -B

    - name: Upload Surefire Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-test-results
        path: '**/target/surefire-reports/*.xml'

    - name: Upload Failsafe Integration Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: failsafe-integration-results
        path: '**/target/failsafe-reports/*.xml'
