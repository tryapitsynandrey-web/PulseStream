name: PulseStream CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Docker daemon is automatically active on Ubuntu runners to support Testcontainers

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Clean Build and Verify with Maven
      run: mvn clean verify -B

    - name: Upload Test Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/target/surefire-reports/*.xml
          **/target/failsafe-reports/*.xml
