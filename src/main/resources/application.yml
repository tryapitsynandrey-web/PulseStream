spring:
  application:
    name: PulseStream
  profiles:
    active: local

---
# ==============================================================================
# LOCAL PROFILE CONFIGURATION
# ==============================================================================
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pulsestream}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres_secure_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: pulsestream-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:cHVsc2VzdHJlYW0tZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLW9ubHktMjAyNDAxMDE=}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1 hour

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:PulseStream}
